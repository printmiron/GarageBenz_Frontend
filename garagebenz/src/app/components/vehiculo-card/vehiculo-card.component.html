<div class="card h-100 benz-card shadow-lg bg-dark text-white border-secondary">
  <div class="card-body p-4 d-flex flex-column">

    <div class="d-flex justify-content-between align-items-start mb-3">
      <div>
        <h6 class="text-uppercase text-muted fw-bold small" style="letter-spacing: 2px;">
          Año {{ miVehiculo.anio }}
        </h6>
        <h4 class="card-title mb-0 fw-bold">{{ miVehiculo.modelo }}</h4>
      </div>
      <div class="icon-status">
        <i class="bi bi-patch-check-fill text-success fs-4"></i>
      </div>
    </div>

    <div class="plate-display my-3">
      <div class="plate-bg">
        <span class="plate-number">{{ miVehiculo.matricula }}</span>
      </div>
    </div>

    <div class="tech-info mb-4">
      <div class="d-flex align-items-center mb-2 small text-secondary">
        <i class="bi bi-fingerprint me-2"></i>
        <span>VIN: {{ miVehiculo.vin }}</span>
      </div>
    </div>

    <div class="d-flex gap-2 mt-auto">
      <button [routerLink]="['/dashboard-cliente/vehiculos/view', miVehiculo.id_vehiculo]"
        class="btn btn-outline-light flex-grow-1 btn-sm fw-bold">
        DETALLES
      </button>
      <button (click)="deleteVehiculo(miVehiculo)" class="btn btn-outline-danger btn-sm">
        <i class="bi bi-trash3"></i>
      </button>
    </div>

  </div>
</div>
