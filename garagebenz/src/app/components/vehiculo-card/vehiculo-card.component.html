<div class="card-benz h-100 anim-fade-up d-flex flex-column">
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <h5 class="fw-bold fs-4 mb-1">{{ miVehiculo.modelo }}</h5>
      <div class="stat-benz-label">MERCEDES-BENZ · {{ miVehiculo.anio }}</div>
    </div>
    <div class="plate-display">
      <span class="plate-number">{{ miVehiculo.matricula }}</span>
    </div>
  </div>

  <div class="benz-glass p-3 rounded-1 mb-4">
    <div class="row g-2">
      <div class="col-12">
        <span class="stat-benz-label d-block mb-1">Vehicle Identification Number</span>
        <code class="text-white-50 font-mono small">{{ miVehiculo.vin }}</code>
      </div>
    </div>
  </div>

  <div class="mt-auto pt-4 border-top border-light border-opacity-10 d-flex gap-2">
    <button [routerLink]="['/dashboard-cliente/vehiculos/view', miVehiculo.id_vehiculo]"
      class="btn-benz btn-benz-primary flex-grow-1">
      DETALLES TÉCNICOS
    </button>
    <button (click)="deleteVehiculo(miVehiculo)"
      class="btn-benz btn-benz-outline border-danger border-opacity-50 text-danger">
      <i class="bi bi-trash"></i>
    </button>
  </div>
</div>
