<div class="page-benz animate-in">
  <header class="section-header-benz">
    <div>
      <h1 class="benz-gradient-text fs-1 mb-0">MIS VEHÍCULOS</h1>
      <p class="stat-benz-label">CATÁLOGO PERSONAL · {{ arrVehiculos.length }} UNIDADES REGISTRADAS</p>
    </div>
    <div class="ms-auto anim-fade-up">
      <button class="btn-benz btn-benz-primary" routerLink="nuevo">
        <i class="bi bi-plus-lg me-2"></i> REGISTRAR NUEVO VEHÍCULO
      </button>
    </div>
  </header>

  <div class="row g-4 mb-5">
    @for (vehiculo of vehiculosAMostrar; track vehiculo.id_vehiculo) {
    <div class="col-12 col-md-6 col-xl-4">
      <div class="card-wrapper animate-in">
        <app-card-vehiculo [miVehiculo]="vehiculo"></app-card-vehiculo>
      </div>
    </div>
    } @empty {
    <div class="col-12 text-center py-5">
      <div class="empty-garage-box">
        <div class="icon-circle mb-4">
          <i class="bi bi-car-front"></i>
        </div>
        <h4 class="fw-bold tracking-tight">GARAJE VACÍO</h4>
        <p class="text-muted small letter-spacing-2">NO SE HAN DETECTADO UNIDADES VINCULADAS A SU CUENTA</p>
        <button [routerLink]="['/dashboard-cliente/vehiculos/nuevo']" class="btn-benz-outline mt-4">
          AÑADIR VEHÍCULO
        </button>
      </div>
    </div>
    }
  </div>


</div>
