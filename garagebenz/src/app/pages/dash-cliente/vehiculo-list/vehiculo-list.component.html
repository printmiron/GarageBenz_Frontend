<div class="container-fluid p-4 main-garage-container">
  <header class="d-flex justify-content-between align-items-end mb-5 border-bottom pb-4">
    <div class="header-text">
      <h1 class="benz-title">MI GARAJE</h1>
      <p class="benz-subtitle">GESTIÓN DE UNIDADES REGISTRADAS</p>
    </div>
    <div class="text-end">
       <span class="badge-count">{{ vehiculosAMostrar.length }} UNIDADES</span>
    </div>
  </header>

  <div class="row g-4 mb-5">
    @for (vehiculo of vehiculosAMostrar; track vehiculo.id_vehiculo) {
      <div class="col-12 col-md-6 col-xl-4">
        <div class="card-wrapper animate-in">
          <app-card-vehiculo [miVehiculo]="vehiculo"></app-card-vehiculo>
        </div>
      </div>
    } @empty {
      <div class="col-12 text-center py-5">
        <div class="empty-garage-box">
          <div class="icon-circle mb-4">
            <i class="bi bi-car-front"></i>
          </div>
          <h4 class="fw-bold tracking-tight">GARAJE VACÍO</h4>
          <p class="text-muted small letter-spacing-2">NO SE HAN DETECTADO UNIDADES VINCULADAS A SU CUENTA</p>
          <button [routerLink]="['/dashboard-cliente/vehiculos/nuevo']" class="btn-benz-outline mt-4">
            AÑADIR VEHÍCULO
          </button>
        </div>
      </div>
    }
  </div>

  <div class="action-bar-fixed">
    <button [routerLink]="['/dashboard-cliente/vehiculos/nuevo']" class="btn-benz-register">
      <span class="btn-content">
        <i class="bi bi-plus-lg"></i>
        <span class="btn-text">REGISTRAR NUEVO VEHÍCULO</span>
      </span>
      <div class="btn-hover-effect"></div>
    </button>
  </div>
</div>
