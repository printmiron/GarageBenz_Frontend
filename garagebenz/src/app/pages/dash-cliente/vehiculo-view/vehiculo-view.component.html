<div class="min-h-screen bg-[#0f172a] text-slate-200 p-4 md:p-8">
  
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
    <div>
      <h1 class="text-4xl font-black text-white tracking-tighter">MI GARAJE</h1>
      <div class="h-1 w-20 bg-indigo-500 mt-2"></div>
    </div>
    
    <button [routerLink]="['/dashboard-cliente/vehiculos/nuevo']"
      class="group relative px-8 py-3 font-bold text-white transition-all bg-indigo-600 rounded-full hover:bg-indigo-500 hover:shadow-[0_0_20px_rgba(79,70,229,0.4)]">
      <span class="flex items-center gap-2">
        <span class="text-xl group-hover:rotate-90 transition-transform duration-300">+</span>
        REGISTRAR VEHÍCULO
      </span>
    </button>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    @for (v of vehiculos(); track v.idVehiculo) {
      <div class="group relative bg-slate-800/40 backdrop-blur-xl border border-slate-700/50 rounded-3xl overflow-hidden hover:border-indigo-500/50 transition-all duration-500">
        
        <div class="absolute -right-4 -top-4 text-9xl font-black text-slate-700/10 italic group-hover:text-indigo-500/10 transition-colors">
          {{v.anio}}
        </div>

        <div class="p-8 relative">
          <div class="flex justify-between items-start mb-6">
            <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 text-xs font-bold rounded-md border border-indigo-500/20">
              {{v.vin.substring(0, 8)}}...
            </span>
            <div class="flex gap-2">
               <button class="p-2 hover:bg-slate-700 rounded-full text-slate-400 hover:text-white transition-colors">
                 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
               </button>
            </div>
          </div>

          <h2 class="text-2xl font-bold text-white mb-1 group-hover:text-indigo-400 transition-colors uppercase italic tracking-wider">
            {{v.modelo}}
          </h2>
          
          <div class="inline-block px-4 py-1 bg-white text-black font-mono font-black text-lg rounded-sm mb-6 shadow-[4px_4px_0px_#4f46e5]">
            {{v.matricula}}
          </div>

          <div class="grid grid-cols-2 gap-4 border-t border-slate-700/50 pt-6">
            <div>
              <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">Año</p>
              <p class="text-slate-200 font-medium">{{v.anio}}</p>
            </div>
            <div>
              <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">Cliente</p>
              <p class="text-slate-200 font-medium truncate">{{v.cliente.nombre}}</p>
            </div>
          </div>
        </div>
        
        <button (click)="eliminar(v.idVehiculo)"
          class="w-full py-4 bg-slate-900/50 text-rose-400 font-bold text-sm uppercase tracking-tighter hover:bg-rose-500 hover:text-white transition-all opacity-0 group-hover:opacity-100">
          Eliminar de la flota
        </button>
      </div>
    } @empty {
      <div class="col-span-full text-center py-20 bg-slate-800/20 rounded-3xl border-2 border-dashed border-slate-700">
        <p class="text-slate-500 text-xl font-medium">No se han detectado vehículos en el sistema.</p>
      </div>
    }
  </div>
</div>
