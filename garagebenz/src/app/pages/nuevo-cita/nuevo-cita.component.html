<div class="booking-container py-5 min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        
        <div class="card benz-card shadow-lg border-0">
          <div class="card-header border-0 bg-transparent pt-5 px-4">
            <h2 class="text-white fw-light tracking-widest mb-0">AGENDAR <span class="fw-bold">SERVICIO</span></h2>
            <div class="mt-2" style="width: 50px; height: 3px; background-color: var(--color-lochmara);"></div>
          </div>

          <div class="card-body p-4 p-md-5">
            <form [formGroup]="citaForm" (ngSubmit)="onSubmit()">
              
              <div class="mb-4">
                <label class="label-benz">Selecciona tu Vehículo</label>
                <select formControlName="id_vehiculo" class="form-select benz-input">
                  <option value="" disabled selected>Elige un vehículo de tu garaje...</option>
                  @for (v of misVehiculos(); track v.idVehiculo) {
                    <option [value]="v.idVehiculo">{{ v.modelo }} — {{ v.matricula }}</option>
                  }
                </select>
                @if (citaForm.get('id_vehiculo')?.invalid && citaForm.get('id_vehiculo')?.touched) {
                  <small class="text-danger mt-1 d-block fw-bold" style="font-size: 0.7rem;">DEBES SELECCIONAR UN VEHÍCULO</small>
                }
              </div>

              <div class="row mb-4">
                <div class="col-6">
                  <label class="label-benz">Fecha</label>
                  <input type="date" formControlName="fecha_cita" class="form-control benz-input">
                </div>
                <div class="col-6">
                  <label class="label-benz">Hora</label>
                  <select formControlName="hora_cita" class="form-select benz-input">
                    <option value="" disabled selected>--:--</option>
                    <option value="08:00">08:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="16:00">04:00 PM</option>
                  </select>
                </div>
              </div>

              <div class="mb-5">
                <label class="label-benz">Descripción del Problema</label>
                <textarea formControlName="descripcion" rows="4" 
                  class="form-control benz-input" 
                  placeholder="Describe qué necesita tu Mercedes-Benz..."></textarea>
                @if (citaForm.get('description')?.invalid && citaForm.get('description')?.touched) {
                  <small class="text-danger mt-1 d-block fw-bold" style="font-size: 0.7rem;">MÍNIMO 10 CARACTERES REQUERIDOS</small>
                }
              </div>

              <div class="d-flex flex-column gap-3">
                <button type="submit" [disabled]="citaForm.invalid || isSubmitting()" 
                  class="btn btn-benz btn-benz-primary py-3">
                  @if (isSubmitting()) {
                    <span class="spinner-border spinner-border-sm me-2"></span> PROCESANDO...
                  } @else {
                    SOLICITAR CITA TÉCNICA
                  }
                </button>
                
                <a [routerLink]="['/dashboard-cliente/citas']" 
                   class="btn btn-link text-secondary text-decoration-none text-center fw-bold small tracking-widest"
                   style="font-size: 0.7rem;">
                  CANCELAR Y VOLVER
                </a>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
