<div class="page-benz anim-fade-up">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-8">

        <header class="section-header-benz mb-5">
          <h2 class="benz-gradient-text fs-1 mb-0">AGENDAR <span class="fw-bold">SERVICIO</span></h2>

        </header>

        <div class="card-benz p-4 p-md-5">
          <form [formGroup]="citaForm" (ngSubmit)="onSubmit()">

            <div class="row g-4">
              <div class="col-12">
                <div class="form-group-benz">
                  <label class="label-benz">UNIDAD DISPONIBLE EN GARAJE</label>
                  <select formControlName="id_vehiculo" class="form-select benz-input-light">
                    <option value="" disabled selected>Identifique su vehículo...</option>
                    @for (v of misVehiculos(); track v.idVehiculo) {
                    <option [value]="v.idVehiculo">{{ v.modelo | uppercase }} — {{ v.matricula }}</option>
                    }
                  </select>
                  @if (citaForm.get('id_vehiculo')?.invalid && citaForm.get('id_vehiculo')?.touched) {
                  <span class="error-msg">SELECCIÓN OBLIGATORIA</span>
                  }
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group-benz">
                  <label class="label-benz">FECHA DE INTERVENCIÓN</label>
                  <input type="date" formControlName="fecha_cita" class="form-control benz-input-light">
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-group-benz">
                  <label class="label-benz">FRANJA HORARIA</label>
                  <select formControlName="hora_cita" class="form-select benz-input-light">
                    <option value="" disabled selected>--:--</option>
                    <option value="08:00">08:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="14:00">14:00 PM</option>
                    <option value="16:00">16:00 PM</option>
                    <option value="18:00">18:00 PM</option>
                  </select>
                </div>
              </div>

              <div class="col-12">
                <div class="form-group-benz">
                  <label class="label-benz">INFORME DE SÍNTOMAS / REQUERIMIENTOS</label>
                  <textarea formControlName="descripcion" rows="4" class="form-control benz-input-light"
                    placeholder="Escriba los detalles del servicio solicitado..."></textarea>
                  @if (citaForm.get('descripcion')?.invalid && citaForm.get('descripcion')?.touched) {
                  <span class="error-msg">DETALLE INSUFICIENTE (MIN. 10 CARACTERES)</span>
                  }
                </div>
              </div>

              <div class="col-12 mt-5">
                <div class="d-flex flex-column flex-md-row gap-3">
                  <button type="submit" [disabled]="citaForm.invalid || isSubmitting()"
                    class="btn-benz btn-benz-primary flex-grow-1 py-3">
                    @if (isSubmitting()) {
                    <span class="spinner-border spinner-border-sm me-2"></span> PROCESANDO SOLICITUD...
                    } @else {
                    CONFIRMAR CITA TÉCNICA
                    }
                  </button>

                  <button type="button" [routerLink]="['/dashboard-cliente/citas']"
                    class="btn-benz btn-benz-ghost py-3">
                    CANCELAR
                  </button>
                </div>
              </div>
            </div>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
