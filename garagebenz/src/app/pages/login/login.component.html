<div class="login-container">
    <div class="login-overlay"></div>
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <i class="bi bi-gear-wide-connected"></i> GarageBenz
            </div>
            <h1>Iniciar Sesión</h1>
            <p>Accede a tu cuenta exclusiva</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="usuario" formControlName="usuario" placeholder="Tu usuario o email" required>
                </div>
            </div>

            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="contrasena" formControlName="contrasena" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login-submit" [disabled]="loginForm.invalid">
                Entrar <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div class="login-footer">
            <a routerLink="/" class="back-link">
                <i class="bi bi-chevron-left"></i> Volver al inicio
            </a>
        </div>
    </div>
</div>
